name: Build ThingsBoard App

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # 根据 ThingsBoard 版本选择 Flutter 版本
          # 1.8.0 推荐 3.29.0; 1.6.0 推荐 3.24.4
          flutter-version: '3.29.0' 
          channel: 'stable'

      - name: Create configs.json
        run: echo '${{ secrets.THINGSBOARD_CONFIGS }}' > configs.json


      # 第一步修复：自动接受 Android 所有的 SDK 许可
      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      # 第二步修复（可选但推荐）：手动安装报错中提到的特定 NDK 版本
      - name: Install Android NDK
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;29.0.13113456"

      - name: Install Dependencies
        run: flutter pub get


      - name: Build Android APK (Optional)
        run: flutter build apk --no-tree-shake-icons --dart-define-from-file configs.json

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tbmobile-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
